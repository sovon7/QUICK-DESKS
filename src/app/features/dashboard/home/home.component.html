<div class="home-container d-flex flex-column min-vh-100">
  <!-- Header -->
  <header class="header d-flex justify-content-between align-items-center">
    <div class="header-left d-flex align-items-center">
      <div class="logo d-flex align-items-center gap-2 fw-bold fs-5">
        <span class="logo-icon fs-3">🏠</span>
        <span class="logo-text">QuickDesk</span>
      </div>
    </div>
    <div class="header-right d-flex align-items-center gap-3">
      <div class="welcome-section d-flex align-items-center gap-2">
        <span class="greeting">Welcome, {{ currentUser?.firstName }}!</span>
        <div class="avatar d-flex align-items-center justify-content-center">
          {{ currentUser?.firstName?.charAt(0)?.toUpperCase() || 'U' }}
        </div>
      </div>
      <button class="logout-btn cursor-pointer border-0" (click)="logout()">Logout</button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main-content flex-grow-1">
    <div class="content-header text-center mb-4">
      <h1>Welcome to QuickDesk!</h1>
      <p class="subtitle">Select a feature to get started.</p>
    </div>

    <div class="tiles-grid">
      <div
        *ngFor="let tile of tiles"
        class="tile cursor-pointer d-flex flex-column align-items-center justify-content-center"
        [class.tile-weather]="tile.id === 'weather'"
        [class.tile-jokes]="tile.id === 'jokes'"
        [class.tile-notepad]="tile.id === 'notepad'"
        [class.tile-game]="tile.id === 'game'"
        (click)="navigateToTile(tile)"
      >
        <div class="tile-icon">{{ tile.icon }}</div>
        <div class="tile-title">{{ tile.title }}</div>
        <div class="tile-description">{{ tile.description }}</div>
      </div>
    </div>
  </main>
</div>
