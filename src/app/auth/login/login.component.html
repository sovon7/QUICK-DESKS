<div class="login-container">
  <div class="login-card">
    <h2>Login</h2>
    <p class="demo-info">Demo Credentials: demo&#64;quickdesk.com / Demo&#64;123</p>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div *ngIf="loginError" class="alert alert-danger">
        {{ loginError }}
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          class="form-control"
          [class.is-invalid]="submitted && f['email'].errors"
          placeholder="Enter your email"
        />
        <small class="error-text" *ngIf="submitted && f['email'].errors">
          <span *ngIf="f['email'].errors['required']">Email is required</span>
          <span *ngIf="f['email'].errors['email']">Invalid email format</span>
        </small>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          [class.is-invalid]="submitted && f['password'].errors"
          placeholder="Enter your password"
        />
        <small class="error-text" *ngIf="submitted && f['password'].errors">
          <span *ngIf="f['password'].errors['required']">Password is required</span>
          <span *ngIf="f['password'].errors['minlength']">Password must be at least 6 characters</span>
        </small>
      </div>

      <button type="submit" class="btn btn-primary">Login</button>
      <button type="button" class="btn btn-secondary" (click)="fillDemoCredentials()">Fill Demo Credentials</button>
    </form>

    <p class="register-link">
      Don't have an account? <a (click)="navigateToRegister()">Click here to register</a>
    </p>
  </div>
</div>
